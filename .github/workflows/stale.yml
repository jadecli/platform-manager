name: Stale

on:
  schedule:
    - cron: '27 1 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-label: stale
          stale-issue-message: 'No activity in 60 days. Closing in 14 days unless updated.'
          close-issue-message: 'Closed due to inactivity.'
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-pr-label: stale
          stale-pr-message: 'No activity in 30 days. Closing in 7 days unless updated.'
          close-pr-message: 'Closed due to inactivity.'
          days-before-pr-stale: 30
          days-before-pr-close: 7
          exempt-issue-labels: 'pinned,security,blocked'
          exempt-pr-labels: 'pinned,blocked,do-not-merge'
          exempt-draft-pr: true
          remove-stale-when-updated: true
