name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read
  id-token: write

jobs:
  claude-review:
    if: |
      github.actor != 'dependabot[bot]' &&
      (github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request') &&
      (
        (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Extract Linear ticket from branch
        id: ticket
        if: github.event_name == 'pull_request'
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          if [[ "$BRANCH" =~ pm-([0-9]+) ]]; then
            echo "id=PM-${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "url=https://linear.app/jadecli/issue/PM-${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          fi

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: "true"
          classify_inline_comments: "true"
          include_fix_links: "true"
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.
            Linear ticket: ${{ steps.ticket.outputs.id || 'none' }}
            Linear URL: ${{ steps.ticket.outputs.url || 'n/a' }}

            Review against CONTRIBUTING.md criteria (Cherny Method):
            - Types first, implementation follows
            - One logical change per PR
            - Tests verify behavior, not implementation
            - PR title follows conventional commits

            Key checks:
            - No ANTHROPIC_API_KEY usage (must use OAuth token)
            - No pickle.loads (use JSON serialization)
            - URL validation on all crawler inputs
            - Parameterized SQL in all Neon queries

            Render verdict: REJECT, REVISE, or APPROVE with justification.
          claude_args: "--max-turns 5 --max-budget-usd 3 --model claude-opus-4-6"
          trigger_phrase: "@claude"
