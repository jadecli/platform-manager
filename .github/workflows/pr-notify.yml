name: PR Notifications

on:
  pull_request:
    types: [opened, ready_for_review]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Determine event type
        id: event
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEW_STATE: ${{ github.event.review.state }}
          REVIEW_AUTHOR: ${{ github.event.review.user.login }}
          CHECK_BRANCH: ${{ github.event.check_suite.head_branch }}
          CHECK_URL: ${{ github.event.check_suite.url }}
          CHECK_CONCLUSION: ${{ github.event.check_suite.conclusion }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            echo "type=pr_created" >> "$GITHUB_OUTPUT"
            {
              echo 'title<<GHEOF'
              echo "$PR_TITLE"
              echo 'GHEOF'
            } >> "$GITHUB_OUTPUT"
            echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
            echo "author=$PR_AUTHOR" >> "$GITHUB_OUTPUT"
            echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          elif [[ "$EVENT_NAME" == "pull_request_review" ]]; then
            echo "type=review_${REVIEW_STATE}" >> "$GITHUB_OUTPUT"
            {
              echo 'title<<GHEOF'
              echo "$PR_TITLE"
              echo 'GHEOF'
            } >> "$GITHUB_OUTPUT"
            echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
            echo "author=$REVIEW_AUTHOR" >> "$GITHUB_OUTPUT"
            echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          elif [[ "$EVENT_NAME" == "check_suite" ]]; then
            echo "type=checks_${CHECK_CONCLUSION}" >> "$GITHUB_OUTPUT"
            echo "url=$CHECK_URL" >> "$GITHUB_OUTPUT"
            echo "branch=$CHECK_BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          TYPE="${{ steps.event.outputs.type }}"
          TITLE="${{ steps.event.outputs.title }}"
          URL="${{ steps.event.outputs.url }}"
          AUTHOR="${{ steps.event.outputs.author }}"
          NUM="${{ steps.event.outputs.number }}"
          BRANCH="${{ steps.event.outputs.branch }}"

          case "$TYPE" in
            pr_created)
              TEXT=":rocket: *PR #${NUM} created* by ${AUTHOR}\n<${URL}|${TITLE}>"
              ;;
            review_approved)
              TEXT=":white_check_mark: *PR #${NUM} approved* by ${AUTHOR}\n<${URL}|${TITLE}>\n_Ready to merge — needs your approval_"
              ;;
            review_changes_requested)
              TEXT=":warning: *Changes requested* on PR #${NUM} by ${AUTHOR}\n<${URL}|${TITLE}>"
              ;;
            checks_success)
              TEXT=":green_circle: *All checks passed* on \`${BRANCH}\`"
              ;;
            checks_failure)
              TEXT=":red_circle: *Checks failed* on \`${BRANCH}\`"
              ;;
            *)
              exit 0
              ;;
          esac

          jq -n --arg text "$TEXT" '{text: $text}' | \
            curl -sS -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d @-
